<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="icon" href="icons/youtube.png">
  <title>Youtube_clone</title>
  <style>
    * {
      margin-top: 0;
      margin-bottom: 0;
      margin-left: 0;
      margin-right: 0;
      font-family: roboto, arial;
    }

    body {
      padding-top: 80px;
      padding-left: 90px;
      padding-right: 30px;
    }


    .sidebar {

      position: fixed;
      left: 0;
      bottom: 0;
      top: 60px;
      background-color: white;
      width: 70px;
      z-index: 200;
      padding-top: 5px;
    }

    .sidebar_link img {
      height: 27px;
      margin-bottom: 4px;
    }

    .sidebar_link {
      height: 78px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
    }

    .sidebar_link div {
      font-size: 10px;
    }

    .sidebar_link:hover {
      border-radius: 5px;
      background-color: rgb(246, 246, 246);
    }

    .header {
      height: 60px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      position: fixed;
      top: 0;
      right: 0;
      left: 0;
      z-index: 100;
      background-color: rgba(255, 255, 255, 0.142);
    }

    .left_section {
      display: flex;
      flex-direction: row;
      align-items: center;

    }

    .hamburger_menu {
      height: 20px;
      margin-left: 24px;
      margin-right: 24px;
      position: relative;
      transition: background-color 0.15s;
    }

    .ham_tooltip {
      background-color: rgba(204, 204, 204, 0.384);
      height: 40px;
      width: 40px;
      border-radius: 20px;
      margin-left: 13px;
      position: absolute;
      opacity: 0;
    }

    .ham_tooltip:hover {
      opacity: 1;
    }

    .youtube_logo {
      height: 24px;
      cursor: pointer;
    }

    .middle_section {
      flex: 1;
      display: flex;
      align-items: center;
      margin-left: 50px;
      margin-right: 10px;
      max-width: 700px;
    }

    .search_bar {
      flex: 1;
      height: 40px;
      width: 900px;
      border: solid gray;
      border-top-left-radius: 20px;
      border-bottom-left-radius: 20px;
      border-width: 1px;
      padding-left: 10px;
      font-size: 16px;
      width: 0;
    }

    .search_bar::placeholder {
      font-size: 16px;
    }

    .search_button {
      height: 44px;
      width: 65px;
      border-top-right-radius: 21px;
      border-bottom-right-radius: 21px;
      margin-top: 1px;
      border: 1px solid gray;
      border-width: 1px;
      margin-left: -1px;
      background-color: rgb(245, 245, 245);
      margin-right: 20px;
      transition: background-color 0.15s;
    }

    .search_button:hover {
      background-color: rgb(239, 239, 239);
      cursor: pointer;
    }

    .search_button,
    .voice_search,
    .create_button,
    .notifications_icon_container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .search_button .tooltip,
    .voice_search .tooltip,
    .create_button .tooltip,
    .notifications_icon_container .tooltip {
      position: absolute;
      bottom: -30px;
      background-color: gray;
      color: white;
      padding-bottom: 2px;
      padding-top: 2px;
      padding-left: 3px;
      padding-right: 3px;
      font-size: 10px;
      opacity: 0;
      border: none;
      border-radius: 2px;
      transition: opacity 0.15;
      white-space: nowrap;

    }

    .search_button:hover .tooltip,
    .voice_search .tooltip:hover,
    .create_button .tooltip:hover,
    .notifications_icon_container .tooltip:hover {
      opacity: 1;

    }

    .search_icon {
      height: 23px;
    }

    .voice_search {
      height: 40px;
      width: 40px;
      border: none;
      border-radius: 22px;
      background-color: rgb(237, 236, 236);
      transition: background-color 0.15s;
    }

    .voice_search:hover {
      background-color: rgb(228, 228, 228);
      cursor: pointer;
    }

    .voice_search_button {
      width: 24px;
      height: 24px;
    }

    .right_section {
      width: 180px;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }


    .sign_in_button {

      margin-right: 23px;
      display: flex;
      align-items: center;
      border-color: rgb(234, 234, 234);
      border-style: solid;
      border-width: 1px;
      border-radius: 19px;
      padding-top: 3px;
      padding-bottom: 3px;
      padding-left: 10px;
      padding-right: 10px;
      background-color: white;
      transition: background-color 0.15s;
    }

    .sign_in_profile {
      height: 30px;
      margin-right: 5px;
    }



    .sign_in_button:hover {
      background-color: rgb(215, 215, 215);
      cursor: pointer;
    }

    .sign_in_text {
      font-weight: bold;
    }


    .recommand_box {
      background-color: white;
      height: 90px;
      display: flex;
      align-items: center;
      flex-direction: column;
      justify-content: center;
      margin-left: 200px;
      margin-right: 200px;
      border-radius: 15px;
      box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);

    }

    .head_text {
      font-family: roboto, arial;
      font-weight: bold;
      font-size: 22px;
      line-height: 40px;
      margin-bottom: 12px;
    }

    .middle_text {
      color: rgb(132, 132, 132);
      font-size: 14px;
    }

    .dots_icon {
      height: 22px;

    }

    .settings_box {
      position: relative;
    }

    .tooltip {
      position: absolute;
      bottom: -30px;
      background-color: gray;
      color: white;
      padding-bottom: 3px;
      padding-top: 3px;
      padding-left: 4px;
      padding-right: 4px;
      font-size: 12px;
      opacity: 0;
      border: none;
      border-radius: 2px;
      transition: opacity 0.15;
      white-space: nowrap;
    }

    .settings_box:hover .tooltip {
      opacity: 1;
    }
  </style>
</head>

<body>
  <header>
    <div class="header">
      <div class="left_section">
        <img src="icons/hamburger.png" alt="" class="hamburger_menu">
        <div class="ham_tooltip"></div>
        <img src="icons/youtube-logo.svg" alt="" class="youtube_logo">
      </div>
      <div class="middle_section">
        <input type="text" placeholder="Search" class="search_bar">
        <button class="search_button">
          <img src="icons/loupe.png" alt="" class="search_icon">
          <div class="tooltip">search</div>
        </button>
        <button class="voice_search">
          <img src="icons/voice.svg.png" alt="" class="voice_search_button">
          <div class="tooltip">search by your voice</div>
        </button>
      </div>
      <div class="right_section">
        <div class="settings_box">
          <img src="icons/dots.png" alt="" class="dots_icon">
          <div class="tooltip">settings</div>
        </div>

        <div class="upload_icon_container">
          <div class="create_button">
            <button class="sign_in_button">
              <img src="icons/user.png" alt="" class="sign_in_profile">
              <div class="sign_in_text">Sign in</div>

            </button>

          </div>
        </div>
      </div>
    </div>
  </header>
  <nav>
    <div class="sidebar">
      <div class="sidebar_link">
        <img src="icons/home.png" alt="" class="sidebar_image">
        <div>Home</div>
      </div>
      <div class="sidebar_link">
        <img src="icons/youtube-shorts_new.jpg" alt="" class="sidebar_image">
        <div>Shorts</div>
      </div>
      <div class="sidebar_link">
        <img src="icons/subscriptions.svg" alt="" class="sidebar_image">
        <div>Subcriptions</div>
      </div>
      <div class="sidebar_link">
        <img src="icons/user.png" alt="" class="sidebar_image">
        <div>You</div>
      </div>
    </div>
  </nav>
  <main>
    <section class="recommand_box">
      <div class="head_text">
        Try searching to get started
      </div>
      <div class="middle_text">
        Start watching videos to help us build a feed of you'll love.
      </div>
    </section>
  </main>
</body>

</html>
